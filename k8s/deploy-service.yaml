apiVersion: apps/v1
kind: Deployment
metadata:
  name: securexlabs-website
  labels:
    app: securexlabs-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securexlabs-website
  template:
    metadata:
      labels:
        app: securexlabs-website
    spec:
      containers:
        - name: securexlabs-website
          image: securexlabs/website:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: securexlabs-website
  labels:
    app: securexlabs-website
spec:
  type: ClusterIP
  selector:
    app: securexlabs-website
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP